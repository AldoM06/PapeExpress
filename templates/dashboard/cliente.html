{% extends 'base.html' %}
{% block title %}Mi cuenta{% endblock %}
{% block content %}
<div style="min-height:80vh;background:#f8f9fa;padding:6rem 0 3rem;">
  <div class="container">
    <div class="form-card text-center">
      <div class="brand-logo mx-auto mb-3"><i class="bi bi-person-fill"></i></div>
      <h3 class="fw-700">Hola, {{ user.first_name|default:user.username }}</h3>
      <p class="text-muted">Cuenta de cliente PapeExpress</p>
      <div class="row g-3 mt-3">
        <div class="col-md-4"><a href="/productos/" class="btn btn-outline-dark rounded-3 w-100 py-3"><i class="bi bi-grid d-block fs-3 mb-1"></i>Ver Catálogo</a></div>
        <div class="col-md-4"><a href="/socios/mapa/" class="btn btn-outline-dark rounded-3 w-100 py-3"><i class="bi bi-map d-block fs-3 mb-1"></i>Puntos de Venta</a></div>
        <div class="col-md-4"><a href="/contacto/" class="btn btn-outline-dark rounded-3 w-100 py-3"><i class="bi bi-envelope d-block fs-3 mb-1"></i>Contactarnos</a></div>
      </div>
      <a href="/accounts/logout/" class="btn btn-outline-danger rounded-pill mt-4">Cerrar sesión</a>
    </div>
  </div>
</div>
{% endblock %}
