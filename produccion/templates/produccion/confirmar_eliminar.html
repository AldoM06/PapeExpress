{% extends 'base.html' %}
{% block title %}Eliminar {{ figura.nombre }}{% endblock %}
{% block content %}
<div style="min-height:80vh;background:#f4f6f9;padding:7rem 0 3rem;display:flex;align-items:center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="form-card text-center">
          <div style="font-size:3.5rem;margin-bottom:1rem">⚠️</div>
          <h4 class="fw-700 mb-2">¿Eliminar figura?</h4>
          <p class="text-muted mb-4">
            Esta acción eliminará permanentemente <strong>{{ figura.nombre }}</strong>
            junto con todos sus archivos, fotos e historial. No se puede deshacer.
          </p>
          <form method="post" class="d-flex gap-2 justify-content-center">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger rounded-pill px-4 fw-700">
              <i class="bi bi-trash me-1"></i>Sí, eliminar
            </button>
            <a href="/produccion/figuras/{{ figura.pk }}/" class="btn btn-outline-secondary rounded-pill px-4">
              Cancelar
            </a>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
